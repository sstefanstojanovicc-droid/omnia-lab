<section id="work" class="omnia-section omnia-section--paper" style="border-top:1px solid var(--line);padding:6rem 0;">
  <div class="omnia-wrap">
    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;gap:2rem;align-items:flex-end;">
      <div>
        <p class="omnia-eyebrow" style="color:var(--ink-muted);">{{ module.eyebrow }}</p>
        <h2 class="omnia-display" style="margin:1.5rem 0 0;font-size:clamp(2rem,5vw,3rem);font-weight:600;text-transform:uppercase;">{{ module.section_title }}</h2>
      </div>
      <p class="omnia-mono" style="max-width:28rem;font-size:11px;line-height:1.65;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);">{{ module.description }}</p>
    </div>
    <div class="omnia-work-grid" style="margin-top:4rem;display:grid;gap:1rem;grid-template-columns:1fr;">
      {% for project in module.projects %}
        <article class="omnia-work-card" style="position:relative;min-height:220px;overflow:hidden;background:var(--smoke);{% if project.span_wide %}grid-column:span 2;{% endif %}">
          {% if project.image.src %}
            <img src="{{ project.image.src }}" alt="{{ project.image.alt|default(project.project_title) }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:grayscale(1);transition:filter 0.7s,transform 1.2s cubic-bezier(0.22,1,0.36,1);" />
          {% endif %}
          <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75),rgba(0,0,0,0.2),transparent);"></div>
          <div style="position:absolute;inset:auto 0 0 0;padding:1.5rem;color:var(--paper);">
            <h3 class="omnia-display" style="margin:0;font-size:1.25rem;font-weight:600;text-transform:uppercase;">{{ project.project_title }}</h3>
          </div>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
<style>
  @media (min-width: 768px) {
    .omnia-work-grid { grid-template-columns: repeat(3, 1fr) !important; auto-rows: 260px; }
    .omnia-work-card { min-height: 260px; }
  }
  .omnia-work-card:hover img { filter: grayscale(0); transform: scale(1.04); }
</style>
