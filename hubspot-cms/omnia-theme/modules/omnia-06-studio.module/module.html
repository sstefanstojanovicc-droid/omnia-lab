<section id="studio" class="omnia-section" style="background:var(--smoke);color:var(--paper);padding:6rem 0;">
  <div class="omnia-wrap">
    <div style="display:grid;gap:4rem;grid-template-columns:1fr;">
      {% if module.portrait.src %}
        <div style="position:relative;aspect-ratio:4/5;overflow:hidden;max-width:520px;">
          <img src="{{ module.portrait.src }}" alt="{{ module.portrait.alt|default('Studio') }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" />
        </div>
      {% endif %}
      <div>
        <p class="omnia-eyebrow" style="color:rgba(247,245,240,0.5);">{{ module.eyebrow }}</p>
        <h2 class="omnia-display" style="margin:1.5rem 0 0;font-size:clamp(2rem,5vw,3rem);font-weight:600;text-transform:uppercase;">{{ module.studio_name }}</h2>
        <p class="omnia-mono" style="margin:0.5rem 0 0;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(247,245,240,0.5);">{{ module.role }}</p>
        <p class="omnia-mono" style="margin:2rem 0 0;max-width:40rem;font-size:11px;line-height:1.9;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,245,240,0.6);">{{ module.bio }}</p>
        <a href="{{ module.instagram_url.href|default('https://www.instagram.com/omnia___lab') }}" target="_blank" rel="noopener" class="omnia-mono" style="display:inline-flex;align-items:center;gap:1rem;margin-top:2.5rem;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--paper);text-decoration:none;">
          {{ module.instagram_label }}
          <span style="height:1px;width:2rem;background:rgba(247,245,240,0.4);"></span>
        </a>
      </div>
    </div>
  </div>
</section>
<style>
  @media (min-width: 1024px) {
    #studio .omnia-wrap > div { grid-template-columns: 1fr 1fr !important; align-items: start; }
  }
</style>
