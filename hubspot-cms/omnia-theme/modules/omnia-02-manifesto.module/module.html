<section id="manifesto" class="omnia-section omnia-section--paper" style="border-top:1px solid var(--line);">
  <div class="omnia-wrap">
    <p class="omnia-eyebrow" style="color:var(--ink-muted);">{{ module.eyebrow }}</p>
    <h2 class="omnia-display" style="margin:3rem 0 0;font-size:clamp(2rem,5vw,3.5rem);font-weight:600;text-transform:uppercase;line-height:1.1;letter-spacing:-0.02em;max-width:56rem;">{{ module.heading }}</h2>
    <p class="omnia-mono" style="margin:2rem 0 0;max-width:48rem;font-size:11px;line-height:1.9;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);">{{ module.manifesto_copy }}</p>
  </div>
</section>
